<!DOCTYPE html>
<html>
<head>
<title>My Room</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#003366;
margin-bottom:20px;
}

.box{
background:#eef4ff;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.box p{
font-size:18px;
margin:10px 0;
}

</style>
</head>

<body>

<div class="container">

<h2>My Assigned Room</h2>

<div class="box" id="roomBox">

</div>

</div>

<script>

let guests =
JSON.parse(localStorage.getItem("guests")) || [];

if(guests.length > 0){

let resident = guests[0];

document.getElementById("roomBox").innerHTML =

`
<p><b>Resident:</b> ${resident.name}</p>

<p><b>Building:</b> Royal Tower</p>

<p><b>Room Number:</b> ${resident.room}</p>

<p><b>Status:</b> Occupied</p>
`;

}
else{

document.getElementById("roomBox").innerHTML =

"<h3>No Room Assigned</h3>";

}

</script>

</body>
</html>s
