<!DOCTYPE html>
<html>
<head>
<title>Check Out</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
color:#003366;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#345d85;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

#result{
margin-top:20px;
padding:15px;
background:#eef4ff;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h2>Resident Check-Out</h2>

<input type="text"
id="guestName"
placeholder="Resident Name">

<input type="number"
id="roomNo"
placeholder="Room Number">

<input type="date"
id="checkoutDate">

<input type="number"
id="bill"
placeholder="Bill Amount">

<select id="paymentMethod">
<option value="">Payment Method</option>
<option>Cash</option>
<option>UPI</option>
<option>Paytm</option>
<option>Card</option>
</select>

<select id="paymentStatus">
<option value="">Payment Status</option>
<option>Paid</option>
<option>Pending</option>
</select>

<select id="feedback">

<option value="">Select Feedback</option>
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>

</select>

<button onclick="checkOut()">
Check Out
</button>

<div id="result"></div>

</div>

<script>

function checkOut(){

let guestName =
document.getElementById("guestName").value;

let roomNo =
document.getElementById("roomNo").value;

let checkoutDate =
document.getElementById("checkoutDate").value;

let bill =
document.getElementById("bill").value;

let paymentMethod =
document.getElementById("paymentMethod").value;

let paymentStatus =
document.getElementById("paymentStatus").value;

let feedback =
document.getElementById("feedback").value;

let guests =
JSON.parse(localStorage.getItem("guests")) || [];

let newGuests = [];

let found = false;

for(let i=0; i<guests.length; i++){

if(
guests[i].name === guestName &&
guests[i].room == roomNo
){
found = true;
}
else{
newGuests.push(guests[i]);
}

}

localStorage.setItem(
"guests",
JSON.stringify(newGuests)
);

if(found){

let history =
JSON.parse(localStorage.getItem("history")) || [];

history.push({

name: guestName,
room: roomNo,
bill: bill,
paymentMethod: paymentMethod,
paymentStatus: paymentStatus,
feedback: feedback,
checkoutDate: checkoutDate,
status: "Checked Out"

});

localStorage.setItem(
"history",
JSON.stringify(history)
);
let activity =
JSON.parse(localStorage.getItem("activity")) || [];

activity.push(
"🚪 Checked Out : " + guestName
);

localStorage.setItem(
"activity",
JSON.stringify(activity)
);

document.getElementById("result").innerHTML =

`
<h3>Check Out Successful</h3>

<p><b>Resident:</b> ${guestName}</p>

<p><b>Room:</b> ${roomNo}</p>

<p><b>Bill Amount:</b> ₹${bill}</p>

<p><b>Payment:</b> ${paymentMethod}</p>

<p><b>Status:</b> ${paymentStatus}</p>

<p><b>Feedback:</b> ${feedback}</p>

<p><b>Check Out Date:</b> ${checkoutDate}</p>

`;

}
else{

document.getElementById("result").innerHTML =
"<h3>Resident Not Found</h3>";

}

}

</script>
<script src="common.js"></script>
</body>
</html>
