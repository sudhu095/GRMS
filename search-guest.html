<!DOCTYPE html>
<html>
<head>
<title>Search Guest</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:650px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.15);
}

h2{
text-align:center;
color:#003366;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#003366;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

button:hover{
background:#0055aa;
}

#result{
margin-top:20px;
background:#eef4ff;
padding:20px;
border-radius:10px;
display:none;
}

.close-btn{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
float:right;
width:auto;
}

.status{
color:green;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>🔍 Search Guest</h2>

<input
type="text"
id="search"
placeholder="Enter Guest Name"
autofocus>

<button onclick="searchGuest()">
Search
</button>

<div id="result"></div>

</div>

<script>

function searchGuest(){

let name =
document.getElementById("search").value;

let guests =
JSON.parse(localStorage.getItem("guests")) || [];

let found =
guests.find(
g => g.name.toLowerCase() ==
name.toLowerCase()
);

document.getElementById("result").style.display =
"block";

document.getElementById("search").value = "";

if(found){

document.getElementById("result").innerHTML =

`
<button class="close-btn"
onclick="closeResult()">
✖
</button>

<h3 style="color:green;">
Resident Found ✅
</h3>

<p><b>Name:</b> ${found.name}</p>

<p><b>Phone:</b> ${found.phone}</p>

<p><b>Email:</b> ${found.email || "N/A"}</p>

<p><b>Building:</b> ${found.building}</p>

<p><b>Room:</b> ${found.room}</p>

<p><b>Check In:</b> ${found.checkin || "N/A"}</p>

<p><b>ID Type:</b> ${found.idType || "N/A"}</p>

<p><b>Payment:</b>
${found.payment || "Pending"}
</p>

<p class="status">
Status : Occupied
</p>
`;

}
else{

document.getElementById("result").innerHTML =

`
<button class="close-btn"
onclick="closeResult()">
✖
</button>

<h3 style="color:red;">
Resident Not Found ❌
</h3>
`;

}

}

function closeResult(){

document.getElementById("result").style.display =
"none";

document.getElementById("search").value = "";

}

document.getElementById("search")
.addEventListener(
"keyup",
function(event){

if(event.key === "Enter"){

searchGuest();

}

});

</script>

<script src="common.js"></script>

</body>
</html>
