<!DOCTYPE html>
<html>
<head>
<title>Check In</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#003366;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#003366;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0055aa;
}
</style>

</head>

<body>

<div class="container">

<h2>Resident Check In</h2>

<input type="text"
id="guestName"
placeholder="Resident Name">

<input type="number"
id="roomNo"
placeholder="Room Number">

<input type="date"
id="checkInDate">

<h3>KYC Verification</h3>

<select id="idType">
<option value="">Select ID Proof</option>
<option>Aadhaar Card</option>
<option>PAN Card</option>
<option>Passport</option>
<option>Driving Licence</option>
</select>

<input type="file" id="idProof">

<input type="file" id="photo">

<button onclick="checkIn()">
Check In
</button>

</div>

<script>

function checkIn(){

let guestName =
document.getElementById("guestName").value;

let roomNo =
document.getElementById("roomNo").value;

let idType =
document.getElementById("idType").value;

let guests =
JSON.parse(localStorage.getItem("guests")) || [];

let found = false;

for(let i=0; i<guests.length; i++){

if(
guests[i].name === guestName &&
guests[i].room == roomNo
){
found = true;
break;
}

}

if(found){

alert(
"Check In Successful\n\n" +
"Resident: " + guestName +
"\nRoom: " + roomNo +
"\nKYC Completed: " + idType
);

}
else{

alert("Resident Not Found");

}

}

</script>

</body>
</html>
