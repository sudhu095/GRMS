<!DOCTYPE html>
<html>
<head>
<title>Resident History</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#003366;
margin-bottom:20px;
}

#clearBtn{
background:red;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
margin-bottom:20px;
}

#clearBtn:hover{
background:darkred;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#003366;
color:white;
padding:12px;
}

td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

tr:nth-child(even){
background:#f2f2f2;
}

</style>

</head>

<body>

<div class="container">

<h2>Resident History</h2>

<button onclick="clearHistory()" id="clearBtn">
Clear History
</button>

<table>

<tr>
<th>Resident</th>
<th>Room</th>
<th>Bill</th>
<th>Payment</th>
<th>Status</th>
<th>Feedback</th>
<th>Date</th>
</tr>

<tbody id="historyTable">

</tbody>

</table>

</div>

<script>

let history =
JSON.parse(localStorage.getItem("history")) || [];

let table =
document.getElementById("historyTable");

for(let i=0; i<history.length; i++){

table.innerHTML += `

<tr>

<td>${history[i].name}</td>

<td>${history[i].room}</td>

<td>₹${history[i].bill}</td>

<td>${history[i].paymentMethod}</td>

<td>${history[i].paymentStatus}</td>

<td>${history[i].feedback}</td>

<td>${history[i].checkoutDate}</td>

</tr>

`;

}

function clearHistory(){

let confirmDelete =
confirm("Are you sure you want to clear history?");

if(confirmDelete){

localStorage.removeItem("history");

location.reload();

}

}

</script>

</body>
</html>
