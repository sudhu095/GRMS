<!DOCTYPE html>
<html>
<head>
<title>Search Guest</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#003366;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#003366;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
background:#eef4ff;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Search Guest</h2>

<input type="text"
id="search"
placeholder="Enter Guest Name">

<button onclick="searchGuest()">
Search
</button>

<div id="result"></div>

</div>

<script>

function searchGuest(){

let name =
document.getElementById("search").value;

let guests =
JSON.parse(localStorage.getItem("guests")) || [];

let found = guests.find(
g => g.name.toLowerCase() ==
name.toLowerCase()
);

if(found){

document.getElementById("result").innerHTML =

`
<p><b>Name:</b> ${found.name}</p>

<p><b>Phone:</b> ${found.phone}</p>

<p><b>Building:</b> ${found.building}</p>

<p><b>Room:</b> ${found.room}</p>

<p><b>Status:</b> Occupied</p>

`;

}
else{

document.getElementById("result").innerHTML =
"<h3>Guest Not Found</h3>";

}

}

</script>
<script src="common.js"></script>
</body>
</html>
