<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuestLink - GRMS</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">

        <div class="login-box">

            <h1>GuestLink</h1>
            <h3>Guest Room Management System</h3>

            <form id="loginForm">

                <input type="text"
                       id="username"
                       placeholder="Username"
                       required>

                <input type="password"
                       id="password"
                       placeholder="Password"
                       required>

                <button type="submit">
                    Login
                </button>

            </form>

        </div>

    </div>

    <script src="script.js"></script>
    <script src="common.js"></script>
</body>
</html>
