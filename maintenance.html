<!DOCTYPE html>
<html>
<head>
<title>Maintenance Ticket</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#003366;
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#003366;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
font-size:16px;
}

button:hover{
background:#0055aa;
}

#result{
margin-top:20px;
padding:15px;
background:#eef4ff;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#003366;
color:white;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Raise Maintenance Ticket</h2>

<input type="text"
id="resident"
placeholder="Resident Name">

<input type="text"
id="room"
placeholder="Room Number">

<select id="issueType">

<option value="">Select Issue Type</option>
<option>AC Problem</option>
<option>Water Leakage</option>
<option>Electricity Issue</option>
<option>Fan Problem</option>
<option>TV Problem</option>
<option>WiFi Issue</option>
<option>Cleaning Required</option>
<option>Other</option>

</select>

<select id="priority">

<option value="">Select Priority</option>
<option>High</option>
<option>Medium</option>
<option>Low</option>

</select>

<textarea
id="issue"
placeholder="Describe the problem">
</textarea>

<button onclick="submitTicket()">
Submit Ticket
</button>

<div id="result"></div>

<h2>Maintenance History</h2>

<table>

<thead>

<tr>
<th>Ticket ID</th>
<th>Room</th>
<th>Issue</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="ticketTable">
</tbody>

</table>

</div>

<script>

function submitTicket(){

let resident =
document.getElementById("resident").value;

let room =
document.getElementById("room").value;

let issueType =
document.getElementById("issueType").value;

let priority =
document.getElementById("priority").value;

let issue =
document.getElementById("issue").value;

if(
resident=="" ||
room=="" ||
issueType=="" ||
priority==""
){
alert("Please fill all fields");
return;
}

let ticketId =
"MNT" + Math.floor(Math.random()*10000);

document.getElementById("result").innerHTML =

`
<h3>Ticket Raised Successfully</h3>

<p><b>Ticket ID:</b> ${ticketId}</p>

<p><b>Resident:</b> ${resident}</p>

<p><b>Room:</b> ${room}</p>

<p><b>Issue:</b> ${issueType}</p>

<p><b>Priority:</b> ${priority}</p>

<p><b>Status:</b> Pending</p>
`;

document.getElementById("ticketTable").innerHTML +=

`
<tr>

<td>${ticketId}</td>

<td>${room}</td>

<td>${issueType}</td>

<td>${priority}</td>

<td>Pending</td>

<td>
<button class="deleteBtn"
onclick="deleteTicket(this)">
Delete
</button>
</td>

</tr>
`;

document.getElementById("resident").value="";
document.getElementById("room").value="";
document.getElementById("issueType").value="";
document.getElementById("priority").value="";
document.getElementById("issue").value="";

}

function deleteTicket(button){

button.parentElement.parentElement.remove();

}

</script>

</body>
</html>
