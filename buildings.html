<!DOCTYPE html>
<html>
<head>
<title>Buildings</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#003366;
margin-bottom:20px;
}

.building{
background:#eef4ff;
padding:20px;
margin:15px 0;
border-left:5px solid #003366;
border-radius:10px;
}

.room{
display:inline-block;
background:#2563eb;
color:white;
padding:8px 15px;
margin:5px;
border-radius:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Buildings & Rooms</h1>

<div class="building">
<h2>Royal Tower</h2>

<div class="room">101</div>
<div class="room">102</div>
<div class="room">103</div>
<div class="room">104</div>

</div>

<div class="building">
<h2>Green Residency</h2>

<div class="room">201</div>
<div class="room">202</div>
<div class="room">203</div>
<div class="room">204</div>

</div>

<div class="building">
<h2>Sunrise Block</h2>

<div class="room">301</div>
<div class="room">302</div>
<div class="room">303</div>
<div class="room">304</div>

</div>

</div>

</body>
</html>
