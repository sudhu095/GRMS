<!DOCTYPE html>
<html>
<head>
<title>View Residents</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
overflow-x:auto;
}

h2{
text-align:center;
margin-bottom:20px;
color:#003366;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:12px;
text-align:center;
}

th{
background:#003366;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

.deleteBtn:hover{
background:darkred;
}

.noData{
text-align:center;
font-size:18px;
color:red;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>View Residents</h2>

<table>

<thead>

<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Gender</th>
<th>Building</th>
<th>Room</th>
<th>Check In</th>
<th>ID Type</th>
<th>Payment</th>
<th>Action</th>
</tr>

</thead>

<tbody id="guestTable">

</tbody>

</table>

<p id="message" class="noData"></p>

</div>

<script>

let guests =
JSON.parse(localStorage.getItem("guests")) || [];

let table =
document.getElementById("guestTable");

if(guests.length === 0){

document.getElementById("message").innerHTML =
"No Residents Found";

}

guests.forEach(function(guest){

table.innerHTML += `

<tr>

<td>${guest.name}</td>

<td>${guest.phone}</td>

<td>${guest.email || "-"}</td>

<td>${guest.gender || "-"}</td>

<td>${guest.building || "-"}</td>

<td>${guest.room}</td>

<td>${guest.checkin || "-"}</td>

<td>${guest.idType || "-"}</td>

<td>${guest.paymentStatus || "-"}</td>

<td>
<button class="deleteBtn"
onclick="deleteGuest('${guest.name}')">
Delete
</button>
</td>

</tr>

`;

});

function deleteGuest(name){

let confirmDelete =
confirm("Are you sure you want to delete this resident?");

if(confirmDelete){

let guests =
JSON.parse(localStorage.getItem("guests")) || [];

guests = guests.filter(
guest => guest.name !== name
);

localStorage.setItem(
"guests",
JSON.stringify(guests)
);

location.reload();

}

}

</script>

</body>
</html>
