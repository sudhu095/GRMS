<!DOCTYPE html>
<html>
<head>
<title>Add Resident</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:550px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
color:#003366;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#003366;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
font-size:16px;
}

button:hover{
background:#0055aa;
}

</style>

</head>

<body>

<div class="container">

<h2>Add Resident</h2>

<input type="text"
id="name"
placeholder="Resident Name">

<input type="text"
id="phone"
placeholder="Phone Number">

<input type="email"
id="email"
placeholder="Email Address">

<select id="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<select id="building">
<option value="">Select Building</option>
<option value="Royal Tower">Royal Tower</option>
<option value="Green Residency">Green Residency</option>
<option value="Sunrise Block">Sunrise Block</option>
</select>

<input type="number"
id="room"
placeholder="Room Number">

<input type="date"
id="checkin">

<select id="idType">
<option value="">Select ID Type</option>
<option>Aadhaar Card</option>
<option>PAN Card</option>
<option>Passport</option>
<option>Driving Licence</option>
</select>

<input type="text"
id="documentNo"
placeholder="Document Number">

<input type="file"
id="documentFile">

<input type="number"
id="amount"
placeholder="Amount">

<select id="paymentMethod">
<option value="">Select Payment Method</option>
<option>Cash</option>
<option>UPI</option>
<option>Paytm</option>
<option>Card</option>
</select>

<select id="paymentStatus">
<option value="">Payment Status</option>
<option>Paid</option>
<option>Pending</option>
</select>

<button onclick="saveGuest()">
Save Resident
</button>

</div>

<script>

function saveGuest(){

let guest = {

name:
document.getElementById("name").value,

phone:
document.getElementById("phone").value,

email:
document.getElementById("email").value,

gender:
document.getElementById("gender").value,

building:
document.getElementById("building").value,

room:
document.getElementById("room").value,

checkin:
document.getElementById("checkin").value,

idType:
document.getElementById("idType").value,

documentNo:
document.getElementById("documentNo").value,

documentFile:
document.getElementById("documentFile").value,

amount:
document.getElementById("amount").value,

paymentMethod:
document.getElementById("paymentMethod").value,

paymentStatus:
document.getElementById("paymentStatus").value

};

let guests =
JSON.parse(localStorage.getItem("guests")) || [];

guests.push(guest);

localStorage.setItem(
"guests",
JSON.stringify(guests)
);

alert("Resident Saved Successfully");

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("email").value="";
document.getElementById("gender").value="";
document.getElementById("building").value="";
document.getElementById("room").value="";
document.getElementById("checkin").value="";
document.getElementById("idType").value="";
document.getElementById("documentNo").value="";
document.getElementById("documentFile").value="";
document.getElementById("amount").value="";
document.getElementById("paymentMethod").value="";
document.getElementById("paymentStatus").value="";

}

</script>
<script src="common.js"></script>
</body>
</html>
